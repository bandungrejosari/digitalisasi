<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Peta UMKM</title>
    <meta name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <style>
        #map{
            height:600px;
            width:100%;
        }
        #hasilTerdekat { margin-top: 10px; max-height: 200px; overflow-y: auto; }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.css">
</head>

<body>

<div id="map">
    <div class="map-header">
         <div class="judul-row">

            <div class="logo-kiri">
                <img src="logo-kiri.png" alt="Logo BPS">
                <img src="logo-kiri2.png" alt="Logo Kelurahan">
            </div>

            <h2 class="judul">
                Peta Kuliner Bandungrejosari
            </h2>

            <div class="logo-kanan">
                <img src="logo-kanan.png" alt="Logo Kampus">
            </div>
        </div>
        <div class="map-toolbar">
        <div class="toolbar-scroll">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input
                    type="text"
                    id="searchBox"
                    placeholder="Mau makan apa?"
                    onclick="bukaSearch()">
            </div>
        <button onclick="lokasiSaya()">📍 Lokasi Saya</button>
        <button onclick="cariMakananTerdekat()">🍜 Makanan</button>
        <button onclick="cariMinumanTerdekat()">🥤 Minuman</button>
        <button onclick="cariTerdekat()">🍽️ Semua Kuliner</button>
        <button class="filter-btn" onclick="tampilkanRekomendasi()">⭐ Rekomendasi</button>
        <a href="https://datastudio.google.com/reporting/ca301d70-9364-4d5c-9027-b3175db13afc"
   target="_blank"
   class="toolbar-btn">
   📊 Dashboard </a>
        </div>
        </div>
    </div>
     <div id="searchOverlay">
        <button class="close-btn" onclick="tutupSearch()">
            ← Kembali
        </button>

        <input
            type="text"
            id="searchInput"
            placeholder="Cari UMKM..."
            oninput="cariUMKM()"
            autofocus>

        <div id="hasilSearch"></div>

    </div>
</div>
    <div id="bottomSheet">

        <button class="close-sheet"
                onclick="tutupSheet()">
            ✕
        </button>

        <div id="sheetContent"></div>

    </div>
        <div id="fotoOverlay" onclick="tutupFoto()">

        <img id="fotoBesar">

    </div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <script src="script.js"></script>
    
    

</body>
</html>
